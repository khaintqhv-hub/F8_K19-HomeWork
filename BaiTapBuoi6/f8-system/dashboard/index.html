<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">

    <style>

        .big{
            border:2px solid black;
            padding:20px;
        }

    </style>
</head>
<body>
    <div class="big">
       
    <h1 class="title" id="special" style="color:red">DASHBOARD</h1>
    <!-- Phan tu nay co:
    tag(h1) + class(.title) + id(#special) + inline style
    CSS tu base.css + theme.css + internal CSS

    Selector thang: inline style
    Vi inline style co do uu tien cao nhat.

    Mau hien thi:red -->

    <h2 class="section">Tong quan he thong</h2>

    <h3 class="title">Courses</h3>
    <p class="hightlight">Quan ly khoa hoc</p>

    <h3 class="title">Students</h3>
    <p class="hightlight">Quan ly hoc vien</p>

    <h3 class="title">Teachers</h3>
    <p class="hightlight">Quan ly giang vien</p>

    <h3 class="title">Orders</h3>
    <p class="hightlight">Quan ly don hang</p>

    <h3 class="title">Reports</h3>
    <p class="hightlight">Thong ke he thong</p>
    </div>
</body>
</html>
