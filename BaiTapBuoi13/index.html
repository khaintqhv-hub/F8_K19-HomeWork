<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strips Hover Effect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="strips">
        <section class="strip strip1">
            <h2 class="strip-title">Relax</h2>
            <img src=" https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&h=600&fit=crop" alt="Relax" class="strip-image">
            <div class="strip-overlay"></div>
        </section>

        <section class="strip strip2">
            <h2 class="strip-title">Explore</h2>
            <img class="strip-image" alt="Explore" src=" https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=800&h=600&fit=crop">
            <div class="strip-overlay"></div>
        </section>

        <section class="strip strip3">
            <h2 class="strip-title">Travel</h2>
            <img class="strip-image" alt="Travel" src=" https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?w=800&h=600&fit=crop">
            <div class="strip-overlay"></div>
        </section>

        <section class="strip strip4">
            <h2 class="strip-title">Achieve</h2>
            <img class="strip-image" alt="Achieve" src=" https://images.unsplash.com/photo-1484589065579-248aad0d8b13?w=800&h=600&fit=crop">
            <div class="strip-overlay"></div>
        </section>

        <section class="strip strip5">
            <h2 class="strip-title">Dare</h2>
            <img class="strip-image" alt="Dare" src=" https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&h=600&fit=crop">
            <div class="strip-overlay"></div>
        </section>
    </main>
</body>
</html>
