<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders</title>

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">

</head>
<body>
    
    <h1 style="color:red">ORDER PAGE</h1>

    <h2 class="title" id="special" style="color:purple">Danh sach don hang</h2>
    <!-- Phan tu nay co:
    tag(h2) + class(.title)+ id(#special)+ inline style
    CSS tu base.css va theme.css

    Selector thang: inline style
    Vi inline style co do uu tien cao nhat trong CSS.

    Mau hien thi: purple -->

    <p style="color:blue">Don hang 001</p>

    <p style="color:green">Don hang 002</p>

    <p class="highlight">Don hang 003</p>

    <p clas="hightlight">Don hang 004</p>
    
</body>
</html>
