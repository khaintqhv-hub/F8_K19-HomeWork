<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal</title>
</head>
<style>
    *{
        box-sizing:border-box;
    }
    body{
        margin:0;
        font-family:Arial, sans-serif;
        text-align:center;
        background:#ffffff;
    }

    #modal-toggle{
        display:none;
    }

    .open{
        padding:10px 20px;
        background:#3b82f6;
        color:#fff;
        cursor:pointer;
        display:inline-block;
    }

    .overlay{
        display:none;
        width:100vw;
        height:100vh;
        background:rgba(0,0,0,0.5);
        text-align:center;
    }

   .modal{
        display: inline-block;
        background:#fff;
        color:#333;
        padding:30px;
        margin-top:150;
   }

   .close{
        display:inline-block;
        margin-top:20px;
        padding:8px 15px;
        background:#ef4444;
        color:#fff;
        cursor:pointer;
   }

   #modal-toggle:checked ~.overlay{
        display:block;
   }
</style>
<body>
    <input type="checkbox" id="modal-toggle">

    <!-- nút mở -->
    <label for="modal-toggle" class="open">Mở modal</label>

    <!-- overlay -->
     <label for="modal-toggle" class="overlay">
        <div class="modal">
            <p>Đây là nội dung thông báo!</p>
            <!-- nút đóng -->
             <label for="modal-toggle" class="close">
                Đóng
             </label>
        </div>
     </label>
</body>
</html>
